<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Check</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #startScreen, #loading, #videoScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #loading, #videoScreen {
      display: none;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .hint {
      opacity: 0.7;
      font-size: 14px;
    }

    /* fake loading bar */
    .bar {
      width: 60%;
      height: 10px;
      border: 1px solid white;
      margin-top: 20px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: white;
      animation: load 2.5s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>System Check Required</h1>
  <div class="hint">Press ENTER to continue</div>
</div>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>Checking system files...</h1>
  <div class="bar"><div class="fill"></div></div>
</div>

<!-- VIDEO SCREEN -->
<div id="videoScreen">
  <video id="vid" autoplay muted>
    <source src="shimmy.mp4" type="video/mp4">
  </video>
</div>

<script>
  const start = document.getElementById("startScreen");
  const loading = document.getElementById("loading");
  const videoScreen = document.getElementById("videoScreen");
  const vid = document.getElementById("vid");

  // Step 1: Press Enter
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      start.style.display = "none";
      loading.style.display = "flex";

      // Step 2: fake loading delay
      setTimeout(() => {
        loading.style.display = "none";
        videoScreen.style.display = "block";

        // try fullscreen
        document.documentElement.requestFullscreen?.();

        // unmute + play chaos
        vid.muted = false;
        vid.volume = 1;
        vid.play();
      }, 3000);
    }
  });
</script>

</body>
</html>
